name: setup-java-test-env

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "17"
        required: false

      gradle-task:
        type: string
        required: true

      gradle-args:
        type: string
        required: false
        default: ""

      upload-artifacts:
        type: boolean
        required: false
        default: true

jobs:
  gradle-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Checkout test project
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: gradle

      - name: Grant Gradle permission
        run: chmod +x ./gradlew

      - name: Check environment
        run: |
          java -version
          ./gradlew --version
          google-chrome --version || true

      - name: Debug Gradle command
        run: |
          echo "gradle-task=${{ inputs.gradle-task }}"
          echo "gradle-args=${{ inputs.gradle-args }}"
          echo "./gradlew ${{ inputs.gradle-task }} ${{ inputs.gradle-args }}"

      - name: Run Gradle task
        run: ./gradlew clean ${{ inputs.gradle-task }} ${{ inputs.gradle-args }}

      - name: Debug Allure results
        if: always()
        run: |
          pwd
          ls -la
          ls -la allure-results || true

      - name: Upload Allure results
        if: ${{ always() && inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: warn
