name: setup-java-test-env.yml
on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "17"
        required: false

      gradle-task:
        type: string
        required: true

      gradle-args:
        type: string
        required: false
        default: ""

      upload-artifacts:
        type: boolean
        required: false
        default: true

jobs:
  gradle-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Checkout test project
        uses: actions/checkout@v4

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: gradle

      - name: Grant Gradle permission
        run: chmod +x ./gradlew

      - name: Check environment
        run: |
          java -version
          ./gradlew --version
          google-chrome --version || true

      - name: Run Gradle task
        run: ./gradlew ${{ inputs.gradle-task }} ${{ inputs.gradle-args }} --headless=true

      - name: Upload test artifacts
        if: ${{ always() && inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-artifacts
          path: |
            **/build/reports/tests/
            **/build/test-results/
            **/build/allure-results/
